version: 2

project_name: tervdocs

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: tervdocs
    binary: tervdocs
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X tervdocs/cmd.version={{.Version}}

archives:
  - formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github

release:
  github:
    owner: tervux
    name: tervdocs
