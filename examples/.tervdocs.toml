provider = "free"
model = "glm-4.7-flash"
template = "tervux"
developer_name = "Someone"
temperature = 0.2
timeout = 60

[output]
file = "README.md"
backup = true

[scan]
include = ["cmd", "internal", "pkg", "src", "app"]
exclude = ["node_modules", ".git", "dist", "build", "vendor", "coverage", ".next", ".turbo", "bin", ".idea", ".vscode", ".qoder", ".codex"]
max_files = 200
max_bytes_per_file = 50000

[providers.free]
api_key = ""
model = "glm-4.7-flash"
base_url = "https://api.z.ai/api/paas/v4"

[providers.openai]
api_key = ""
model = "gpt-4o-mini"
